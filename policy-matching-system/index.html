<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>정책자금 매칭 | 내부 운영</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=Noto+Serif+KR:wght@700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-header">
    <div>
      <span class="internal-badge">INTERNAL</span>
      <h1>정책자금 매칭 시스템</h1>
      <p>진단 DB vs 정책 DB · 룰 기반 추천 (전문 검토 후 안내용)</p>
    </div>
    <div class="header-actions">
      <span id="load-status"></span>
      <button type="button" class="btn-refresh" id="btn-refresh">새로고침</button>
    </div>
  </header>

  <main class="workspace">
    <aside class="panel panel-left">
      <div class="panel-head">
        <h2>업체 리스트</h2>
        <p class="panel-head-meta"><span id="company-count">0건</span> · 정책자금_무료진단_DB</p>
        <input type="search" class="panel-search" id="company-search" placeholder="업체명·업종 검색" autocomplete="off" />
      </div>
      <div class="panel-body" id="company-list">
        <p class="panel-empty">불러오는 중…</p>
      </div>
    </aside>

    <section class="panel panel-center">
      <div class="panel-head">
        <h2>업체 상세</h2>
        <p class="panel-head-meta">고객 진단 데이터</p>
      </div>
      <div class="panel-body" id="company-detail">
        <p class="panel-empty">좌측에서 업체를 선택하세요.</p>
      </div>
    </section>

    <section class="panel panel-right">
      <div class="panel-head">
        <h2>추천 정책자금</h2>
        <p class="panel-head-meta"><span id="match-count"></span> · 정책자금매칭 시트</p>
      </div>
      <div class="panel-body" id="match-results">
        <p class="panel-empty">업체 선택 후 추천 정책이 표시됩니다.</p>
      </div>
    </section>
  </main>

  <footer class="app-footer">
    공개 홈페이지 CTA(상담 신청)와 분리된 내부 분석 도구입니다. 최종 안내는 담당자 검토 후 진행하세요.
  </footer>

  <script src="config.js"></script>
  <script src="matching.js"></script>
  <script src="app.js"></script>
</body>
</html>
