<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>정책자금 상담관리 | 나호훈 경영컨설팅</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=Noto+Serif+KR:wght@700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy: #0F2448;
      --navy-dark: #0a1a35;
      --accent: #c9a84c;
      --bg-gray: #f7f9fc;
      --border: #e8edf5;
      --muted: #6b7280;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      color: #1a202c;
      background: var(--bg-gray);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    h1, h2 { font-family: 'Noto Serif KR', serif; letter-spacing: -.03em; }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 1.25rem 1rem 2.5rem; }
    .top-bar {
      background: linear-gradient(135deg, #0F2448 0%, #1a3a6e 100%);
      color: #fff;
      padding: 1.35rem 1rem 1.5rem;
      margin: 0 -1rem 1.25rem;
      border-radius: 0 0 1rem 1rem;
    }
    .top-bar h1 { font-size: 1.35rem; font-weight: 800; margin-bottom: .35rem; }
    .top-bar p { font-size: .82rem; color: rgba(255,255,255,.72); margin-bottom: 1rem; }
    .top-actions { display: flex; flex-wrap: wrap; gap: .6rem; align-items: center; }
    .btn-refresh {
      display: inline-flex; align-items: center; gap: .4rem;
      padding: .55rem 1rem; border-radius: .45rem;
      font-size: .82rem; font-weight: 700;
      background: #FEE500; color: #3A1D1D;
      border: none; cursor: pointer;
      font-family: 'Noto Sans KR', sans-serif;
    }
    .btn-refresh:disabled { opacity: .6; cursor: wait; }
    .filter-select {
      flex: 1; min-width: 140px; max-width: 220px;
      padding: .55rem .75rem; border-radius: .45rem;
      border: 1px solid rgba(255,255,255,.25);
      background: rgba(255,255,255,.1); color: #fff;
      font-size: .82rem; font-family: 'Noto Sans KR', sans-serif;
    }
    .filter-select option { color: #1a202c; }
    .status-msg { font-size: .78rem; color: rgba(255,255,255,.55); }
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: .55rem;
      margin-bottom: 1.25rem;
    }
    @media (min-width: 640px) {
      .summary-grid { grid-template-columns: repeat(4, 1fr); }
    }
    @media (min-width: 900px) {
      .summary-grid { grid-template-columns: repeat(4, 1fr); }
    }
    .summary-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: .65rem;
      padding: .75rem .85rem;
      text-align: center;
    }
    .summary-card .label { font-size: .7rem; color: var(--muted); font-weight: 600; margin-bottom: .2rem; }
    .summary-card .count { font-size: 1.35rem; font-weight: 800; color: var(--navy); }
    .summary-card.total { border-color: var(--navy); background: rgba(15,36,72,.04); }
    .list-section h2 {
      font-size: 1rem; color: var(--navy);
      margin-bottom: .75rem;
      display: flex; align-items: center; justify-content: space-between;
      gap: .5rem;
    }
    .list-count { font-size: .75rem; font-weight: 600; color: var(--muted); font-family: 'Noto Sans KR', sans-serif; }
    .consult-list { display: flex; flex-direction: column; gap: .85rem; }
    .consult-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: .75rem;
      padding: 1rem 1.1rem;
      box-shadow: 0 2px 12px rgba(15,36,72,.04);
    }
    .card-head {
      display: flex; flex-wrap: wrap;
      align-items: flex-start; justify-content: space-between;
      gap: .5rem; margin-bottom: .75rem;
      padding-bottom: .65rem;
      border-bottom: 1px solid var(--border);
    }
    .card-meta { font-size: .72rem; color: var(--muted); }
    .card-title { font-size: .95rem; font-weight: 700; color: var(--navy); margin-top: .15rem; }
    .badge {
      display: inline-block;
      padding: .22rem .55rem;
      border-radius: 999px;
      font-size: .68rem;
      font-weight: 700;
      white-space: nowrap;
    }
    .badge-신규 { background: #e5e7eb; color: #374151; }
    .badge-상담중 { background: #dbeafe; color: #1d4ed8; }
    .badge-자료요청 { background: #ede9fe; color: #6d28d9; }
    .badge-진행중 { background: #ffedd5; color: #c2410c; }
    .badge-보류 { background: #fef9c3; color: #a16207; }
    .badge-완료 { background: #dcfce7; color: #15803d; }
    .badge-부결 { background: #fee2e2; color: #b91c1c; }
    .badge-default { background: #f3f4f6; color: #4b5563; }
    .card-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: .45rem .75rem;
      font-size: .78rem;
    }
    @media (min-width: 560px) {
      .card-grid { grid-template-columns: 1fr 1fr; }
    }
    .field { display: flex; flex-direction: column; gap: .1rem; }
    .field.full { grid-column: 1 / -1; }
    .field-label { font-size: .68rem; font-weight: 600; color: var(--muted); }
    .field-value { color: #2d3748; word-break: break-word; }
    .field-value.empty { color: #9ca3af; font-style: italic; }
    .memo-box {
      margin-top: .65rem;
      padding: .65rem .75rem;
      background: var(--bg-gray);
      border-radius: .45rem;
      font-size: .78rem;
      color: #374151;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .empty-state, .error-state {
      text-align: center;
      padding: 2.5rem 1rem;
      background: #fff;
      border: 1px dashed var(--border);
      border-radius: .75rem;
      color: var(--muted);
      font-size: .88rem;
    }
    .error-state { color: #b91c1c; border-color: #fecaca; background: #fff8f8; }
    .loading { text-align: center; padding: 2rem; color: var(--muted); font-size: .88rem; }
    .back-link {
      display: inline-block;
      margin-top: 1.5rem;
      font-size: .78rem;
      color: var(--muted);
      text-decoration: none;
    }
    .back-link:hover { color: var(--navy); }
    .status-change-select {
      padding: .2rem .4rem;
      border-radius: .35rem;
      border: 1px solid var(--border);
      font-size: .72rem;
      font-family: 'Noto Sans KR', sans-serif;
      color: #1a202c;
      background: #fff;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="top-bar">
      <h1>정책자금 상담관리</h1>
      <p>무료진단 신청 현황 및 상담 진행상태 관리</p>
      <div class="top-actions">
        <button type="button" class="btn-refresh" id="btn-refresh">새로고침</button>
        <select class="filter-select" id="status-filter" aria-label="상태 필터">
          <option value="">전체</option>
          <option value="신규">신규</option>
          <option value="상담중">상담중</option>
          <option value="자료요청">자료요청</option>
          <option value="진행중">진행중</option>
          <option value="보류">보류</option>
          <option value="완료">완료</option>
          <option value="부결">부결</option>
        </select>
        <span class="status-msg" id="load-status"></span>
      </div>
    </header>

    <section class="summary-grid" id="summary-grid" aria-label="상태별 요약"></section>

    <section class="list-section">
      <h2>
        최근 상담 리스트
        <span class="list-count" id="list-count"></span>
      </h2>
      <div id="list-container">
        <div class="loading" id="loading">데이터를 불러오는 중…</div>
      </div>
    </section>

    <a class="back-link" href="index.html">← 홈으로</a>
  </div>

  <script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbzR3AtUMSmYhx4vEjnuB8-kM07ziaaDRstZRIhrGCvparuzAllKDGK16Vd8aJfYP0Ov/exec';

    const STATUS_LIST = ['신규', '상담중', '자료요청', '진행중', '보류', '완료', '부결'];

    const FIELDS = [
      { key: '접수일', label: '접수일' },
      { key: '상태', label: '상태', skipInGrid: true },
      { key: '업체명', label: '업체명', skipInGrid: true },
      { key: '담당자', label: '담당자', alt: ['담당자명', 'contactName'] },
      { key: '연락처', label: '연락처', alt: ['phone'] },
      { key: '지역', label: '지역' },
      { key: '업종', label: '업종' },
      { key: '사업자유형', label: '사업자유형', alt: ['bizType'] },
      { key: '사업자형태', label: '사업자형태', alt: ['businessForm'] },
      { key: '자금유형', label: '자금유형', alt: ['fundType'] },
      { key: '예상가능성', label: '예상가능성' },
      { key: '추천사업', label: '추천사업' },
      { key: '다음액션', label: '다음액션' }
    ];

    var pipelineData = [];

    function getField(row, key, altKeys) {
      if (!row) return '';
      var v = row[key];
      if (v !== undefined && v !== null && String(v).trim() !== '') return String(v).trim();
      if (altKeys) {
        for (var i = 0; i < altKeys.length; i++) {
          v = row[altKeys[i]];
          if (v !== undefined && v !== null && String(v).trim() !== '') return String(v).trim();
        }
      }
      return '';
    }

    function escapeHtml(str) {
      return String(str || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function getStatusBadgeClass(status) {
      var s = String(status || '').trim();
      if (STATUS_LIST.indexOf(s) >= 0) return 'badge badge-' + s;
      return 'badge badge-default';
    }

    function renderSummary(rows) {
      var grid = document.getElementById('summary-grid');
      var counts = { total: rows.length };
      STATUS_LIST.forEach(function (st) { counts[st] = 0; });
      rows.forEach(function (row) {
        var st = getField(row, '상태');
        if (counts[st] !== undefined) counts[st]++;
      });

      var html = '<div class="summary-card total"><div class="label">전체</div><div class="count">' + counts.total + '</div></div>';
      STATUS_LIST.forEach(function (st) {
        html += '<div class="summary-card"><div class="label">' + st + '</div><div class="count">' + (counts[st] || 0) + '</div></div>';
      });
      grid.innerHTML = html;
    }

    function buildStatusSelect(status, receiptNo) {
      var opts = STATUS_LIST.map(function(s) {
        return '<option value="' + escapeHtml(s) + '"' + (s === status ? ' selected' : '') + '>' + escapeHtml(s) + '</option>';
      }).join('');
      return '<select class="status-change-select" data-receipt="' + escapeHtml(receiptNo) + '" data-old="' + escapeHtml(status) + '" onchange="updateStatus(this)">' + opts + '</select>';
    }

    async function updateStatus(selectEl) {
      var newStatus = selectEl.value;
      var receiptNo = selectEl.getAttribute('data-receipt');
      var oldStatus = selectEl.getAttribute('data-old');

      if (!confirm('상태를 변경하시겠습니까?')) {
        selectEl.value = oldStatus;
        return;
      }

      try {
        var res = await fetch(GAS_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'updateStatus', receiptNo: receiptNo, status: newStatus })
        });
        var text = await res.text();
        var result;
        try { result = JSON.parse(text); } catch (e) { throw new Error('응답 JSON 파싱 실패'); }
        if (result.success) {
          alert('상태가 변경되었습니다.');
          loadPipeline();
        } else {
          alert(result.message || '상태 변경 실패');
          selectEl.value = oldStatus;
        }
      } catch (err) {
        alert(err.message || '상태 변경 실패');
        selectEl.value = oldStatus;
      }
    }

    function renderConsultCard(row) {
      var status = getField(row, '상태') || '-';
      var company = getField(row, '업체명') || '(업체명 없음)';
      var received = getField(row, '접수일') || '-';
      var memo = getField(row, '상담메모');
      var receiptNo = getField(row, '접수번호') || getField(row, 'receiptNo') || '';

      var gridHtml = '';
      FIELDS.forEach(function (f) {
        if (f.skipInGrid) return;
        var val = getField(row, f.key, f.alt);
        gridHtml += '<div class="field">' +
          '<span class="field-label">' + escapeHtml(f.label) + '</span>' +
          '<span class="field-value' + (val ? '' : ' empty') + '">' + escapeHtml(val || '-') + '</span>' +
          '</div>';
      });

      var memoHtml = memo
        ? '<div class="field full"><span class="field-label">상담메모</span><div class="memo-box">' + escapeHtml(memo) + '</div></div>'
        : '<div class="field full"><span class="field-label">상담메모</span><span class="field-value empty">-</span></div>';

      return '<article class="consult-card">' +
        '<div class="card-head">' +
          '<div><div class="card-meta">' + escapeHtml(received) + '</div><div class="card-title">' + escapeHtml(company) + '</div></div>' +
          '<div style="display:flex;align-items:center;gap:.4rem;flex-wrap:wrap;">' +
            '<span class="' + getStatusBadgeClass(status) + '">' + escapeHtml(status) + '</span>' +
            buildStatusSelect(status, receiptNo) +
          '</div>' +
        '</div>' +
        '<div class="card-grid">' + gridHtml + memoHtml + '</div>' +
      '</article>';
    }

    function getFilteredRows() {
      var filter = document.getElementById('status-filter').value;
      if (!filter) return pipelineData.slice();
      return pipelineData.filter(function (row) {
        return getField(row, '상태') === filter;
      });
    }

    function renderList() {
      var rows = getFilteredRows();
      var container = document.getElementById('list-container');
      var countEl = document.getElementById('list-count');

      countEl.textContent = rows.length + '건';

      if (!rows.length) {
        container.innerHTML = '<div class="empty-state">표시할 상담 내역이 없습니다.</div>';
        return;
      }

      container.innerHTML = '<div class="consult-list">' +
        rows.map(renderConsultCard).join('') +
        '</div>';
    }

    function setLoadStatus(text) {
      document.getElementById('load-status').textContent = text || '';
    }

    async function loadPipeline() {
      var btn = document.getElementById('btn-refresh');
      var container = document.getElementById('list-container');

      if (!GAS_URL || !String(GAS_URL).trim()) {
        container.innerHTML = '<div class="error-state">GAS_URL이 설정되지 않았습니다.</div>';
        setLoadStatus('');
        return;
      }

      btn.disabled = true;
      setLoadStatus('불러오는 중…');
      container.innerHTML = '<div class="loading">데이터를 불러오는 중…</div>';

      try {
        var url = GAS_URL.trim() + (GAS_URL.indexOf('?') >= 0 ? '&' : '?') + 'action=pipeline';
        var res = await fetch(url);
        var text = await res.text();
        var result;
        try {
          result = JSON.parse(text);
        } catch (e) {
          throw new Error('응답 JSON 파싱 실패');
        }

        if (result.success !== true) {
          throw new Error((result && result.error) ? result.error : '데이터 조회에 실패했습니다.');
        }

        var rows = Array.isArray(result.rows) ? result.rows : [];
        pipelineData = rows;
        renderSummary(rows);
        renderList();
        setLoadStatus('총 ' + rows.length + '건 · ' + formatNow());
      } catch (err) {
        console.error(err);
        pipelineData = [];
        renderSummary([]);
        container.innerHTML = '<div class="error-state">데이터를 불러오지 못했습니다.<br>' + escapeHtml(err.message || String(err)) + '</div>';
        document.getElementById('list-count').textContent = '';
        setLoadStatus('오류');
      } finally {
        btn.disabled = false;
      }
    }

    function formatNow() {
      var d = new Date();
      var p = function (n) { return n < 10 ? '0' + n : n; };
      return p(d.getHours()) + ':' + p(d.getMinutes()) + ' 갱신';
    }

    document.getElementById('btn-refresh').addEventListener('click', loadPipeline);
    document.getElementById('status-filter').addEventListener('change', renderList);

    loadPipeline();
  </script>
</body>
</html>
